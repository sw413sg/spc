<script>
const R=(a,b)=>{const r=[];for(let i=a;i<=b;i++)r.push(i);return r},P=n=>n.toString().padStart(2,'0'),fT=ms=>{const t=Math.floor(ms/1000),h=Math.floor(t/3600),m=Math.floor((t%3600)/60),s=t%60;return`${P(h)}:${P(m)}:${P(s)}`},fM=m=>{const h=Math.floor(m/60),r=Math.ceil(m%60);return h>0?`${h}h ${P(r)}m`:`${r} min`},dK=d=>`${d.getFullYear()}-${P(d.getMonth()+1)}-${P(d.getDate())}`,tK=()=>dK(new Date()),DN=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'],MN=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'],fDL=k=>{const p=k.split('-'),d=new Date(+p[0],+p[1]-1,+p[2]);return`${DN[d.getDay()]} ${+p[2]} ${MN[+p[1]-1]}`};
const MX=37,siloC=s=>Math.floor(s/100)*100,isFiller=s=>[200,400,600].includes(siloC(s)),is700CE=(s,b)=>(b==='ce1'||b==='ce2')&&siloC(s)===700,FILL_15=[702,705,708,711,714,717],FILL_10=[502,505,508,511,514,517];
function fillLim(s){if(isFiller(s))return 4;if(FILL_15.includes(s))return 15;if(FILL_10.includes(s))return 10;return 1}
const has700C=(s,b)=>is700CE(s,b)&&!FILL_15.includes(s);

// Logica matemática basada en el rango 10 (lento) a X (rapido)
function getMins(val) {
    if (val === null || val === undefined) return 5;
    if (typeof val === 'string') {
        if (val === 'moderate') return 4;
        if (val === 'strong') return 3;
    }
    if (typeof val === 'number') {
        return 10 - val;
    }
    return 5; // Default
}

function getMpm(val, silo) {
    const mins = getMins(val);
    if (isFiller(silo)) {
        return mins / 4;
    } else {
        return mins / 1;
    }
}

function getMpmLabel(val, silo) {
    const mins = getMins(val);
    const fm = mins % 1 === 0 ? mins : mins.toFixed(1);
    if (isFiller(silo)) {
        return `${fm} min = 4 mts`;
    } else {
        return `${fm} min = 1 mt`;
    }
}

function effMeters(mt,silo,bid){
  if(!mt||!silo)return 0;
  const lim=fillLim(silo);
  if(mt<=lim)return 0;
  if(has700C(silo,bid)){
    if(mt>15)return(mt-15)+(6-lim);
    if(mt>6)return 6-lim;
    return mt-lim;
  }
  return mt-lim;
}

function calcETA(mt,spd,el,silo,bid){
  const eff=effMeters(mt,silo,bid);
