<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SPC">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>SPC</title>
<style>
  :root {
    --bg: #000000;
    --bg-secondary: #1c1c1e;
    --card: #1c1c1e;
    --card-elevated: #2c2c2e;
    --text: #ffffff;
    --text-secondary: #8e8e93;
    --separator: #38383a;
    --blue: #0a84ff;
    --green: #30d158;
    --orange: #ff9f0a;
    --red: #ff453a;
    --yellow: #ffd60a;
    --purple: #bf5af2;
    --teal: #64d2ff;
    --card-shadow: 0 1px 4px rgba(0,0,0,0.3);
    --safe-top: env(safe-area-inset-top, 20px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    padding: calc(var(--safe-top) + 8px) 20px 12px;
    border-bottom: 0.5px solid rgba(255,255,255,0.08);
  }

  .header h1 {
    font-size: 34px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .active-count {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--green);
    color: #000;
    font-size: 12px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
    margin-left: 8px;
    vertical-align: middle;
  }

  .active-count.hidden { display: none; }

  .pulse-dot {
    width: 6px;
    height: 6px;
    background: #000;
    border-radius: 50%;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .content {
    padding: 16px 16px calc(var(--safe-bottom) + 16px);
    max-width: 500px;
    margin: 0 auto;
  }

  .belt-card {
    background: var(--card);
    border-radius: 16px;
    margin-bottom: 12px;
    box-shadow: var(--card-shadow);
    overflow: hidden;
    transition: transform 0.2s ease;
  }

  .belt-card:active { transform: scale(0.985); }

  .belt-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px;
    cursor: pointer;
  }

  .belt-info {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .belt-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: white;
    font-weight: 700;
    flex-shrink: 0;
  }

  .belt-icon.ce1 { background: var(--blue); }
  .belt-icon.ce2 { background: var(--purple); }
  .belt-icon.cd1 { background: var(--orange); }
  .belt-icon.cd2 { background: var(--green); }
  .belt-icon.cd3 { background: var(--red); }

  .belt-name { font-size: 17px; font-weight: 600; }

  .belt-status { font-size: 13px; color: var(--text-secondary); margin-top: 1px; }
  .belt-status.active { color: var(--green); font-weight: 500; }

  .chevron { color: var(--text-secondary); font-size: 18px; transition: transform 0.3s ease; }
  .belt-card.expanded .chevron { transform: rotate(90deg); }

  .belt-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .belt-card.expanded .belt-body { max-height: 800px; }

  .belt-body-inner { padding: 0 16px 16px; }

  .silo-group-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
    margin-top: 14px;
  }

  .silo-group-label:first-child { margin-top: 0; }

  .silo-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
    margin-bottom: 4px;
    padding: 2px;
  }

  .silo-scroll-area {
    max-height: 280px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    margin-bottom: 16px;
  }

  .silo-scroll-area::-webkit-scrollbar { display: none; }

  .silo-btn {
    aspect-ratio: 1;
    border: none;
    border-radius: 10px;
    background: var(--card-elevated);
    color: var(--text);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    -webkit-user-select: none;
    user-select: none;
  }

  .silo-btn:active { transform: scale(0.92); }

  .silo-btn.selected {
    background: var(--blue);
    color: white;
    box-shadow: 0 2px 12px rgba(10, 132, 255, 0.4);
  }

  .silo-btn.in-use {
    background: var(--orange);
    color: #000;
    opacity: 0.5;
    pointer-events: none;
  }

  .timer-section {
    background: var(--bg);
    border-radius: 14px;
    padding: 20px;
    text-align: center;
    border: 0.5px solid var(--separator);
  }

  .timer-silo-label { font-size: 14px; color: var(--text-secondary); font-weight: 500; margin-bottom: 4px; }
  .timer-silo-number { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 12px; }

  .timer-display {
    font-size: 48px;
    font-weight: 200;
    font-variant-numeric: tabular-nums;
    letter-spacing: -1px;
    color: var(--text);
    line-height: 1;
    margin-bottom: 16px;
  }

  .timer-display.running { color: var(--green); }
  .timer-display.paused { color: var(--orange); animation: blink 1s ease-in-out infinite; }

  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  .timer-controls { display: flex; gap: 10px; justify-content: center; }

  .timer-btn {
    height: 44px;
    padding: 0 24px;
    border: none;
    border-radius: 22px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: all 0.2s ease;
    -webkit-user-select: none;
    user-select: none;
  }

  .timer-btn:active { transform: scale(0.95); }
  .btn-start { background: var(--green); color: #000; flex: 1; }
  .btn-pause { background: var(--orange); color: #000; flex: 1; }
  .btn-stop { background: rgba(255, 69, 58, 0.2); color: var(--red); width: 44px; padding: 0; flex-shrink: 0; }

  .no-silo-msg { font-size: 14px; color: var(--text-secondary); text-align: center; padding: 12px 0; }

  .log-section { margin-top: 20px; }
  .log-title { font-size: 22px; font-weight: 700; padding: 0 4px; margin-bottom: 12px; }

  .log-empty {
    text-align: center;
    color: var(--text-secondary);
    font-size: 15px;
    padding: 40px 20px;
    background: var(--card);
    border-radius: 16px;
    box-shadow: var(--card-shadow);
  }

  .log-card { background: var(--card); border-radius: 16px; box-shadow: var(--card-shadow); overflow: hidden; }

  .log-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 0.5px solid var(--separator);
  }

  .log-item:last-child { border-bottom: none; }
  .log-item-left { display: flex; flex-direction: column; gap: 2px; }
  .log-belt-name { font-size: 15px; font-weight: 600; }
  .log-silo-name { font-size: 13px; color: var(--text-secondary); }
  .log-item-right { text-align: right; }
  .log-duration { font-size: 17px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .log-timestamp { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

  .clear-log-btn {
    display: block;
    width: 100%;
    margin-top: 10px;
    padding: 12px;
    background: none;
    border: none;
    color: var(--red);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    text-align: center;
    border-radius: 12px;
  }

  .clear-log-btn:active { background: rgba(255, 69, 58, 0.1); }

  .notification-banner {
    position: fixed;
    top: calc(var(--safe-top) + 8px);
    left: 12px;
    right: 12px;
    background: rgba(44, 44, 46, 0.97);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    color: white;
    border-radius: 16px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 999;
    transform: translateY(-120%);
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  .notification-banner.show { transform: translateY(0); }

  .notif-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .notif-content { flex: 1; min-width: 0; }
  .notif-title { font-size: 14px; font-weight: 600; margin-bottom: 1px; }
  .notif-body { font-size: 13px; opacity: 0.8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .notif-time { font-size: 12px; opacity: 0.5; flex-shrink: 0; }

  .install-prompt {
    background: var(--card);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: var(--card-shadow);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .install-prompt.hidden { display: none; }
  .install-icon { font-size: 32px; flex-shrink: 0; }
  .install-text { flex: 1; }
  .install-text h3 { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
  .install-text p { font-size: 13px; color: var(--text-secondary); }
  .install-dismiss { background: none; border: none; color: var(--text-secondary); font-size: 18px; cursor: pointer; padding: 4px; }
</style>
</head>
<body>

<div class="notification-banner" id="notifBanner">
  <div class="notif-icon" id="notifIcon">🔔</div>
  <div class="notif-content">
    <div class="notif-title" id="notifTitle">SPC</div>
    <div class="notif-body" id="notifBody">Notificación</div>
  </div>
  <div class="notif-time">ahora</div>
</div>

<div class="header">
  <h1>SPC <span class="active-count hidden" id="activeCount"><span class="pulse-dot"></span> <span id="activeNum">0</span> activas</span></h1>
</div>

<div class="content">
  <div class="install-prompt" id="installPrompt">
    <div class="install-icon">📲</div>
    <div class="install-text">
      <h3>Instalá SPC</h3>
      <p>Tocá compartir ↑ y "Agregar a inicio" para usar como app con notificaciones.</p>
    </div>
    <button class="install-dismiss" onclick="dismissInstall()">✕</button>
  </div>

  <div id="beltsContainer"></div>

  <div class="log-section">
    <div class="log-title">Historial</div>
    <div id="logContainer">
      <div class="log-empty">Sin registros aún.<br>Los tiempos se guardarán aquí.</div>
    </div>
  </div>
</div>

<script>
function range(start, end) {
  const arr = [];
  for (let i = start; i <= end; i++) arr.push(i);
  return arr;
}

const BELTS = [
  {
    id: 'ce1', name: 'Cinta CE 1', short: 'CE1', cssClass: 'ce1', emoji: '🔵',
    siloGroups: [{ label: 'Silos 700', silos: range(701, 718) }]
  },
  {
    id: 'ce2', name: 'Cinta CE 2', short: 'CE2', cssClass: 'ce2', emoji: '🟣',
    siloGroups: [{ label: 'Silos 700', silos: range(701, 717) }]
  },
  {
    id: 'cd1', name: 'Cinta CD 1', short: 'CD1', cssClass: 'cd1', emoji: '🟠',
    siloGroups: [
      { label: 'Silos 500', silos: range(501, 518) },
      { label: 'Silos 600', silos: range(601, 617) }
    ]
  },
  {
    id: 'cd2', name: 'Cinta CD 2', short: 'CD2', cssClass: 'cd2', emoji: '🟢',
    siloGroups: [
      { label: 'Silos 300', silos: range(301, 318) },
      { label: 'Silos 400', silos: range(401, 417) }
    ]
  },
  {
    id: 'cd3', name: 'Cinta CD 3', short: 'CD3', cssClass: 'cd3', emoji: '🔴',
    siloGroups: [
      { label: 'Silos 100', silos: range(101, 118) },
      { label: 'Silos 200', silos: range(201, 218) }
    ]
  }
];

function getAllSilos(belt) { return belt.siloGroups.flatMap(g => g.silos); }

const state = {};
const timers = {};
const logs = JSON.parse(localStorage.getItem('siloLogs') || '[]');

BELTS.forEach(b => {
  state[b.id] = { selectedSilo: null, running: false, paused: false, elapsed: 0, startTime: null, pauseOffset: 0 };
});

function renderBelts() {
  const container = document.getElementById('beltsContainer');
  container.innerHTML = BELTS.map(belt => {
    const s = state[belt.id];
    const totalSilos = getAllSilos(belt).length;
    const statusText = s.running ? `Silo ${s.selectedSilo} — cargando` :
                       s.paused ? `Silo ${s.selectedSilo} — pausado` :
                       `${totalSilos} silos disponibles`;
    const statusClass = (s.running || s.paused) ? 'active' : '';

    const siloGridsHTML = belt.siloGroups.map(group => {
      const gridItems = group.silos.map(silo => {
        const inUse = isInUse(silo, belt.id);
        const selected = s.selectedSilo === silo;
        const cls = selected ? 'selected' : inUse ? 'in-use' : '';
        return `<button class="silo-btn ${cls}" onclick="selectSilo('${belt.id}', ${silo})">${silo}</button>`;
      }).join('');
      return `<div class="silo-group-label">${group.label}</div><div class="silo-grid">${gridItems}</div>`;
    }).join('');

    return `
      <div class="belt-card" id="card-${belt.id}">
        <div class="belt-header" onclick="toggleCard('${belt.id}')">
          <div class="belt-info">
            <div class="belt-icon ${belt.cssClass}">${belt.short}</div>
            <div>
              <div class="belt-name">${belt.name}</div>
              <div class="belt-status ${statusClass}" id="status-${belt.id}">${statusText}</div>
            </div>
          </div>
          <div class="chevron">›</div>
        </div>
        <div class="belt-body">
          <div class="belt-body-inner">
            <div class="silo-scroll-area">${siloGridsHTML}</div>
            <div class="timer-section">
              ${s.selectedSilo ? `<div class="timer-silo-label">Silo</div><div class="timer-silo-number">${s.selectedSilo}</div>` : ''}
              <div class="timer-display ${s.running ? 'running' : s.paused ? 'paused' : ''}" id="timer-${belt.id}">${formatTime(s.elapsed)}</div>
              ${s.selectedSilo ? `
                <div class="timer-controls">
                  ${!s.running && !s.paused ? `<button class="timer-btn btn-start" onclick="startTimer('${belt.id}')">▶ Iniciar</button>` : ''}
                  ${s.running ? `<button class="timer-btn btn-pause" onclick="pauseTimer('${belt.id}')">⏸ Pausar</button>` : ''}
                  ${s.paused ? `<button class="timer-btn btn-start" onclick="resumeTimer('${belt.id}')">▶ Reanudar</button>` : ''}
                  ${s.running || s.paused ? `<button class="timer-btn btn-stop" onclick="stopTimer('${belt.id}')">⏹</button>` : ''}
                </div>
              ` : `<div class="no-silo-msg">Seleccioná un silo para comenzar</div>`}
            </div>
          </div>
        </div>
      </div>`;
  }).join('');
}

function renderLog() {
  const container = document.getElementById('logContainer');
  if (logs.length === 0) {
    container.innerHTML = '<div class="log-empty">Sin registros aún.<br>Los tiempos se guardarán aquí.</div>';
    return;
  }
  container.innerHTML = `
    <div class="log-card">
      ${logs.slice().reverse().map(log => `
        <div class="log-item">
          <div class="log-item-left">
            <div class="log-belt-name">${log.belt}</div>
            <div class="log-silo-name">Silo ${log.silo}</div>
          </div>
          <div class="log-item-right">
            <div class="log-duration">${log.duration}</div>
            <div class="log-timestamp">${log.timestamp}</div>
          </div>
        </div>`).join('')}
    </div>
    <button class="clear-log-btn" onclick="clearLog()">Borrar historial</button>`;
}

function updateActiveCount() {
  const count = BELTS.filter(b => state[b.id].running || state[b.id].paused).length;
  const el = document.getElementById('activeCount');
  const num = document.getElementById('activeNum');
  if (count > 0) { el.classList.remove('hidden'); num.textContent = count; }
  else { el.classList.add('hidden'); }
}

function formatTime(ms) {
  const totalSec = Math.floor(ms / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  return `${pad(h)}:${pad(m)}:${pad(s)}`;
}

function pad(n) { return n.toString().padStart(2, '0'); }

function isInUse(silo, excludeBelt) {
  return BELTS.some(b => b.id !== excludeBelt && state[b.id].selectedSilo === silo && (state[b.id].running || state[b.id].paused));
}

function getBeltData(id) { return BELTS.find(b => b.id === id); }

function toggleCard(id) { document.getElementById(`card-${id}`).classList.toggle('expanded'); }

function selectSilo(beltId, silo) {
  const s = state[beltId];
  if (s.running || s.paused) return;
  s.selectedSilo = s.selectedSilo === silo ? null : silo;
  s.elapsed = 0;
  renderBelts();
  document.getElementById(`card-${beltId}`).classList.add('expanded');
}

function startTimer(beltId) {
  const s = state[beltId];
  if (!s.selectedSilo) return;
  s.running = true; s.paused = false; s.startTime = Date.now(); s.pauseOffset = 0; s.elapsed = 0;
  timers[beltId] = setInterval(() => {
    s.elapsed = Date.now() - s.startTime + s.pauseOffset;
    const el = document.getElementById(`timer-${beltId}`);
    if (el) el.textContent = formatTime(s.elapsed);
  }, 200);
  showNotification(beltId, `Carga iniciada — Silo ${s.selectedSilo}`, getBeltData(beltId).emoji);
  renderBelts(); document.getElementById(`card-${beltId}`).classList.add('expanded'); updateActiveCount();
}

function pauseTimer(beltId) {
  const s = state[beltId];
  s.running = false; s.paused = true; s.pauseOffset = s.elapsed;
  clearInterval(timers[beltId]);
  showNotification(beltId, `Carga pausada — Silo ${s.selectedSilo} (${formatTime(s.elapsed)})`, '⏸');
  renderBelts(); document.getElementById(`card-${beltId}`).classList.add('expanded'); updateActiveCount();
}

function resumeTimer(beltId) {
  const s = state[beltId];
  s.running = true; s.paused = false; s.startTime = Date.now();
  timers[beltId] = setInterval(() => {
    s.elapsed = Date.now() - s.startTime + s.pauseOffset;
    const el = document.getElementById(`timer-${beltId}`);
    if (el) el.textContent = formatTime(s.elapsed);
  }, 200);
  showNotification(beltId, `Carga reanudada — Silo ${s.selectedSilo}`, '▶️');
  renderBelts(); document.getElementById(`card-${beltId}`).classList.add('expanded'); updateActiveCount();
}

function stopTimer(beltId) {
  const s = state[beltId];
  const belt = getBeltData(beltId);
  clearInterval(timers[beltId]);
  const duration = formatTime(s.elapsed);
  const now = new Date();
  const timestamp = `${pad(now.getHours())}:${pad(now.getMinutes())} — ${pad(now.getDate())}/${pad(now.getMonth()+1)}/${now.getFullYear()}`;
  logs.push({ belt: belt.name, silo: s.selectedSilo, duration, timestamp, ms: s.elapsed });
  localStorage.setItem('siloLogs', JSON.stringify(logs));
  showNotification(beltId, `Carga finalizada — Silo ${s.selectedSilo} (${duration})`, '✅');
  sendPushNotification(belt.name, `Silo ${s.selectedSilo} cargado en ${duration}`);
  s.running = false; s.paused = false; s.elapsed = 0; s.selectedSilo = null; s.pauseOffset = 0;
  renderBelts(); renderLog(); updateActiveCount();
}

function clearLog() {
  if (confirm('¿Borrar todo el historial?')) { logs.length = 0; localStorage.setItem('siloLogs', JSON.stringify(logs)); renderLog(); }
}

function showNotification(beltId, message, icon) {
  const belt = getBeltData(beltId);
  const banner = document.getElementById('notifBanner');
  document.getElementById('notifIcon').textContent = icon || '🔔';
  document.getElementById('notifIcon').style.background = getComputedStyle(document.querySelector(`.belt-icon.${belt.cssClass}`)).background;
  document.getElementById('notifTitle').textContent = belt.name;
  document.getElementById('notifBody').textContent = message;
  banner.classList.add('show');
  setTimeout(() => banner.classList.remove('show'), 3500);
  if (navigator.vibrate) navigator.vibrate(100);
}

function sendPushNotification(title, body) {
  if ('Notification' in window && Notification.permission === 'granted') {
    try {
      new Notification(title, { body, icon: 'icon-192.png', badge: 'icon-192.png', tag: 'silo-update', renotify: true });
    } catch(e) {
      if (navigator.serviceWorker && navigator.serviceWorker.controller) {
        navigator.serviceWorker.ready.then(reg => {
          reg.showNotification(title, { body, icon: 'icon-192.png', badge: 'icon-192.png', tag: 'silo-update', renotify: true });
        });
      }
    }
  }
}

function requestNotificationPermission() {
  if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();
}

function dismissInstall() {
  document.getElementById('installPrompt').classList.add('hidden');
  localStorage.setItem('installDismissed', 'true');
}

function checkInstallPrompt() {
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  if (isStandalone || localStorage.getItem('installDismissed')) document.getElementById('installPrompt').classList.add('hidden');
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(() => { requestNotificationPermission(); });
}

checkInstallPrompt(); renderBelts(); renderLog(); updateActiveCount();

document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    BELTS.forEach(b => {
      const s = state[b.id];
      if (s.running) {
        s.elapsed = Date.now() - s.startTime + s.pauseOffset;
        const el = document.getElementById(`timer-${b.id}`);
        if (el) el.textContent = formatTime(s.elapsed);
      }
    });
  }
});
</script>
</body>
</html>
