<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--tx);min-height:100vh;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased;transition:background .4s,color .4s}

.hh { display: none !important; }
.hd{background:var(--bg);padding:calc(env(safe-area-inset-top, 44px) + 16px) 12px 16px;border-bottom:1px solid var(--sp)}
.h1r{display:flex;align-items:center;justify-content:space-between}
.h1l{display:flex;align-items:center;gap:12px}
h1{font-size:26px;font-weight:600;letter-spacing:2px;text-transform:uppercase}
.acb{display:inline-flex;align-items:center;gap:5px;background:var(--gnb);border:1px solid rgba(34,197,114,.15);color:var(--gn);font-size:10px;font-weight:600;padding:4px 10px;border-radius:20px;letter-spacing:.5px;text-transform:uppercase}
.pld{width:6px;height:6px;background:var(--gn);border-radius:50%;box-shadow:0 0 8px var(--gn);animation:pl 1.5s ease-in-out infinite}
@keyframes pl{0%,100%{opacity:1}50%{opacity:.3}}
.hrr{display:flex;align-items:center;gap:12px}
.clk{font-size:24px;font-weight:300;letter-spacing:1px;color:var(--tx);opacity:.8}
.hib{background:var(--ce);border:1px solid var(--sp);color:var(--tx2);width:38px;height:38px;border-radius:10px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}.hib:active{background:var(--ch);transform:scale(.94)}
.spacer{height:16px}
.ctn{padding:0 8px calc(env(safe-area-inset-bottom, 34px) + 32px);max-width:500px;margin:0 auto}

/* MODAL DE AJUSTES */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}.mo.sh{opacity:1;pointer-events:auto}
.moi{background:var(--card);border-radius:24px 24px 0 0;width:100%;max-width:500px;padding:0 24px calc(env(safe-area-inset-bottom, 34px) + 32px);transform:translateY(100%);transition:transform .4s cubic-bezier(.32,.72,.24,1);max-height:85vh;overflow-y:auto;border-top:1px solid var(--sp)}.mo.sh .moi{transform:translateY(0)}
.mo-top{display:flex;align-items:center;justify-content:space-between;padding:24px 0 18px;position:sticky;top:0;background:var(--card);z-index:1}
.mot{font-size:18px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--tx2)}
.mo-close{background:var(--ce);border:1px solid var(--sp);color:var(--tx2);width:36px;height:36px;border-radius:10px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}.mo-close:active{background:var(--ch);color:var(--tx)}
.mob{width:100%;height:50px;border:1px solid var(--sp);border-radius:14px;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:0;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s}.mob:active{transform:scale(.98)}
.mob.ex{background:linear-gradient(135deg,var(--ac),#5b6bff);color:white;border:none}.mob.im{background:var(--ce);color:var(--tx)}.mob.ntf{background:linear-gradient(135deg,var(--gn),#2aaa6a);color:white;border:none}.mob.rst{background:var(--orb);color:var(--or);border-color:rgba(232,148,58,.15)}
.imf{display:none}

/* NUEVAS SECCIONES COLAPSABLES EN AJUSTES */
.sg2{margin-bottom:12px;background:var(--bg2);border-radius:14px;border:1px solid var(--sp);overflow:hidden;}
.sgl{font-size:12px;font-weight:600;color:var(--tx);text-transform:uppercase;letter-spacing:1px;margin:0;padding:16px 20px;display:flex;justify-content:space-between;cursor:pointer;transition:all .2s;}.sgl:active{background:var(--ce)}
.sgl span{color:var(--tx2);transition:transform .3s;font-size:14px;line-height:1}
.sg2.op .sgl span{transform:rotate(90deg)}
.sg2-bd{max-height:0;overflow:hidden;transition:max-height .3s ease;}
.sg2.op .sg2-bd{max-height:1200px;}
.sg2-bd-in{padding:0 16px 16px;display:flex;flex-direction:column;gap:6px;}
.sr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--ce);border:1px solid var(--sp);border-radius:12px;margin:0}
.srt{font-size:14px;font-weight:500}

.tg{width:50px;height:28px;border-radius:14px;background:rgba(255,255,255,.08);border:1px solid var(--sp);cursor:pointer;position:relative;transition:all .3s;flex-shrink:0}.tg.on{background:var(--gnd);border-color:rgba(34,197,114,.2)}.tg::after{content:'';position:absolute;width:22px;height:22px;border-radius:11px;background:var(--tx2);top:2px;left:2px;transition:all .3s}.tg.on::after{transform:translateX(22px);background:var(--gn);box-shadow:0 0 10px rgba(34,197,114,.4)}
.tplb{display:flex;flex-direction:column;gap:6px}
.tpl-btn{height:52px;border:1px solid var(--sp);border-radius:14px;background:var(--ce);color:var(--tx2);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;padding:0 20px;gap:12px;transition:all .2s}.tpl-btn:active{transform:scale(.98)}.tpl-btn.av{border-color:var(--acg);box-shadow:0 0 20px var(--acb)}
.tpl-dot{width:20px;height:20px;border-radius:6px;flex-shrink:0}.tpl-info{flex:1}.tpl-name{font-size:13px;font-weight:600;color:var(--tx)}.tpl-desc{font-size:10px;color:var(--tx2);margin-top:1px}
.nst{font-size:11px;color:var(--tx2);text-align:center;margin-bottom:8px;padding:8px;background:var(--ce);border:1px solid var(--sp);border-radius:10px}.nst.ok{color:var(--gn);background:var(--gnb);border-color:rgba(34,197,114,.15)}

.bc{background:var(--card);border-radius:18px;margin-bottom:12px;border:1px solid var(--sp);overflow:hidden;transition:border-color .3s, box-shadow .3s}.bc.xp{border-color:var(--acg)}
.bhr{display:flex;align-items:center;justify-content:space-between;padding:16px 12px;cursor:pointer}
.bfi{display:flex;align-items:center;gap:14px;flex:1;min-width:0}
.bic{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:13px;color:white;font-weight:600;flex-shrink:0;position:relative;overflow:hidden}.bic::before{content:'';position:absolute;inset:0;opacity:.15;background:linear-gradient(135deg,transparent 40%,white)}.bic.ce{background:linear-gradient(135deg,#c44,#d66)}.bic.cd{background:linear-gradient(135deg,#4466aa,#5588cc)}
.bxt{flex:1;min-width:0}.bxn{font-size:18px;font-weight:600}.bxs{font-size:13px;color:var(--tx2);margin-top:4px;overflow:hidden;text-overflow:ellipsis;font-weight:500} 
.bxs.av{color:var(--gn)}
.bxr{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0}
.bxe{font-size:11px;color:var(--ac);font-weight:500;white-space:nowrap}
.bxp{font-size:18px;font-weight:500;color:var(--gn)}.bxp.pa{color:var(--or);animation:bk 1s ease-in-out infinite}
@keyframes bk{0%,100%{opacity:1}50%{opacity:.35}}
.chv{color:var(--tx2);font-size:14px;transition:transform .3s;margin-left:6px;opacity:.5}.bc.xp .chv{transform:rotate(90deg);opacity:1;color:var(--ac)}
.bbd{max-height:0;overflow:hidden;transition:max-height .45s cubic-bezier(.32,.72,.24,1)}.bc.xp .bbd{max-height:1800px}
.bbi{padding:0 12px 20px}
.tsx{background:var(--bg2);border-radius:14px;padding:16px 12px;text-align:center;border:1px solid var(--sp);margin-bottom:12px;position:relative;overflow:hidden}.tsx::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--ac),transparent);opacity:.3}
.txl{font-size:10px;color:var(--tx2);font-weight:500;margin-bottom:4px;letter-spacing:1.5px;text-transform:uppercase}
.txn{font-size:28px;font-weight:700;margin-bottom:8px;letter-spacing:1px}
.txbg{display:flex;gap:6px;justify-content:center;margin-bottom:10px;flex-wrap:wrap}
.txbd{font-size:10px;font-weight:500;padding:4px 10px;border-radius:20px;border:1px solid var(--sp)}.txm{background:var(--orb);color:var(--or);border-color:rgba(232,148,58,.15)}.txs{background:var(--pud);color:var(--pu);border-color:rgba(139,122,245,.15)}
.tdd{font-size:42px;font-weight:300;letter-spacing:2px;color:var(--tx);line-height:1;margin-bottom:6px}.tdd.ru{color:var(--gn);text-shadow:0 0 30px rgba(34,197,114,.2)}.tdd.pa{color:var(--or);animation:bk 1s ease-in-out infinite}
.txe{font-size:12px;color:var(--ac);font-weight:400;margin-bottom:14px}
.txc{display:flex;gap:8px;justify-content:center}
.txb{height:42px;border:none;border-radius:21px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .2s;-webkit-user-select:none;flex:1}.txb:active{transform:scale(.95)}
.xst{background:var(--gn);color:#000}.xpa{background:var(--or);color:#000}.xre{background:var(--acd);color:var(--ac);border:1px solid var(--acg)}.xsp{background:var(--rdd);color:var(--rd);border:1px solid rgba(232,64,87,.12)}
.nsm{font-size:13px;color:var(--tx2);text-align:center;padding:12px 0;opacity:.7}
.rcb{width:100%;height:40px;border:1px solid var(--sp);border-radius:10px;background:var(--ce);color:var(--tx2);font-size:12px;font-weight:500;cursor:pointer;margin-top:12px;display:flex;align-items:center;justify-content:center}.rcb:active{background:var(--ch);color:var(--tx)}
.ctb{display:flex;gap:6px;margin-bottom:10px}
.ctt{flex:1;height:42px;border:1px solid var(--sp);border-radius:10px;background:var(--ce);color:var(--tx2);font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}.ctt:active{transform:scale(.96)}.ctt.av{background:var(--acd);color:var(--ac);border-color:var(--acg)}
.sgr{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;padding:2px}
.sbt{aspect-ratio:1;border:1px solid var(--sp);border-radius:10px;background:var(--ce);color:var(--tx);font-size:11px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}.sbt:active{transform:scale(.9)}.sbt.sl{background:var(--acd);color:var(--ac);border-color:var(--acg);box-shadow:0 0 14px var(--acb)}.sbt.iu{background:var(--orb);color:var(--or);opacity:.5;pointer-events:none}
.msc{margin-top:12px}.msr{display:flex;gap:6px}
.msb{flex:1;height:42px;border:1px solid var(--sp);border-radius:10px;background:var(--ce);color:var(--or);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}.msb:active{transform:scale(.97)}.msb.av{background:var(--ord);border-color:rgba(232,148,58,.2)}
.vcb{flex:1;height:42px;border:1px solid var(--sp);border-radius:10px;background:var(--ce);color:var(--rd);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}.vcb:active{background:var(--rdd)}.vcb.sl{background:var(--rdd);border-color:rgba(232,64,87,.2)}
.mgd{display:grid;grid-template-columns:repeat(9,1fr);gap:3px;margin-top:8px}.mgd.hh{display:none}
.mbt{height:32px;border:1px solid var(--sp);border-radius:8px;background:var(--ce);color:var(--tx2);font-size:10px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}.mbt:active{transform:scale(.9)}.mbt.sl{background:var(--ord);color:var(--or);border-color:rgba(232,148,58,.2)}
.spc{margin-top:10px}

.spd-sl-c { padding: 14px 4px 6px; }
.spd-sl-h { display: flex; justify-content: space-between; font-size: 10px; color: var(--tx2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; font-weight: 600; font-family: var(--mono); }
.spd-sl-v { color: var(--ac); font-size: 13px; }
.spd-range { width: 100%; height: 6px; background: var(--sp); border-radius: 3px; outline: none; -webkit-appearance: none; appearance: none; accent-color: var(--ac); margin-bottom: 8px; }
.spd-range::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 22px; height: 22px; border-radius: 50%; background: var(--ac); cursor: pointer; box-shadow: 0 0 12px var(--acb); }

/* Silos Usados / Resumen */
.suw{background:var(--card);border-radius:14px;border:1px solid var(--sp);margin-bottom:12px;overflow:hidden}
.suh{display:flex;align-items:center;justify-content:space-between;padding:16px 14px;cursor:pointer;transition:all .2s}.suh:active{background:var(--ce)}
.suhl{font-size:13px;font-weight:600;color:var(--ac)}

.suw.op .suhc{transform:rotate(90deg)}
.subd{max-height:0;overflow:hidden;transition:max-height .35s ease}
.suw.op .subd{max-height:5000px}
.supg{display:flex;gap:8px}
.supb{width:28px;height:28px;border-radius:8px;background:var(--ce);border:1px solid var(--sp);color:var(--tx2);font-weight:600;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}.supb:active{background:var(--ch)}
.subelt{border-top:1px solid var(--sp)}
.subh{padding:14px 20px;font-size:12px;font-weight:600;color:var(--tx);display:flex;justify-content:space-between;cursor:pointer;background:var(--bg2);transition:all .2s}.subh:active{background:var(--ce)}
.subh span{color:var(--tx2);transition:transform .2s;font-size:14px;line-height:1}
.subelt.op .subh span{transform:rotate(90deg)}
.subbd{max-height:0;overflow:hidden;transition:max-height .3s ease;background:var(--card)}
.subelt.op .subbd{max-height:1000px;overflow-y:auto}
.suit{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;border-top:1px dashed var(--sp);font-size:12px}
.suit:first-child{border-top:none}
.suits{font-weight:600;color:var(--tx);flex:1;}
.suitm{color:var(--tx2);font-size:11px;white-space:nowrap;}
.suitm.fl{color:var(--gn);font-weight:600}
.suemp{padding:14px 20px;font-size:11px;color:var(--tx2);text-align:center;font-style:italic}
.su-del{background:transparent;border:none;color:var(--tx2);font-size:14px;cursor:pointer;opacity:0.4;transition:all 0.15s;display:flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:6px;margin-left:8px;}
.su-del:active{opacity:1;background:var(--rdd);color:var(--rd)}

.hsx{margin-top:24px}
.hst{font-size:16px;font-weight:600;padding:0 4px;margin-bottom:12px;letter-spacing:1px;text-transform:uppercase;color:var(--tx2)}
.hse{text-align:center;color:var(--tx2);font-size:13px;padding:40px 24px;background:var(--card);border-radius:14px;border:1px solid var(--sp)}
.hday{margin-bottom:6px}
.hdh{display:flex;align-items:center;justify-content:space-between;padding:16px 14px;background:var(--card);border-radius:14px;border:1px solid var(--sp);cursor:pointer;transition:all .2s}.hdh:active{background:var(--ce)}
.hdhl{font-size:13px;font-weight:600;color:var(--ac)}.hdhc{font-size:11px;color:var(--tx2)}.hdch{font-size:12px;color:var(--tx2);transition:transform .25s;margin-left:8px}.hday.op .hdch{transform:rotate(90deg)}
.hdbd{max-height:0;overflow:hidden;transition:max-height .35s ease}.hday.op .hdbd{max-height:5000px;margin-top:4px}
.hbg{margin-bottom:6px}.hbl{font-size:10px;font-weight:500;color:var(--tx2);text-transform:uppercase;letter-spacing:1px;padding:0 4px;margin-bottom:3px}
.hcd{background:var(--card);border-radius:10px;border:1px solid var(--sp);overflow:hidden}
.hii{padding:16px 14px;border-bottom:1px solid var(--sp);position:relative}.hii:last-child{border-bottom:none}
.him{display:flex;justify-content:space-between;align-items:flex-start}.hil{font-size:12px;color:var(--tx);line-height:1.4;flex:1;min-width:0;padding-right:24px}.hmo{color:var(--or);font-weight:600}
.hir{text-align:right;flex-shrink:0;padding-left:10px;padding-right:34px;}.hih{font-size:13px;color:var(--tx);font-weight:500}.hit{font-size:11px;color:var(--tx2);margin-top:2px}
.hi-del{position:absolute;top:10px;right:10px;width:24px;height:24px;border:none;background:transparent;color:var(--tx2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:6px;opacity:.4;transition:all .15s}.hi-del:active{opacity:1;background:var(--rdd);color:var(--rd)}
.hieb{display:inline-flex;align-items:center;gap:4px;background:var(--ce);border:1px solid var(--sp);color:var(--tx2);font-size:10px;font-weight:500;padding:3px 10px;border-radius:20px;margin-top:6px;cursor:pointer}.hieb:active{background:var(--ch)}
.hiu{margin-top:8px;padding-left:12px;border-left:2px solid var(--sp)}
.hiud{font-size:11px;color:var(--tx2);padding:3px 0;line-height:1.35}.hiud span{color:var(--or);font-weight:600}
.hpg{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:12px}
.hpgb{background:var(--ce);border:1px solid var(--sp);color:var(--tx2);padding:9px 18px;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer}.hpgb:active{background:var(--ch)}.hpgb.dis{opacity:.25;pointer-events:none}
.hpgl{font-size:12px;color:var(--tx2)}
.chbb{display:block;width:100%;margin-top:10px;padding:12px;background:none;border:none;color:var(--rd);font-size:13px;font-weight:500;cursor:pointer;text-align:center;border-radius:10px}.chbb:active{background:var(--rdd)}
.nb{position:fixed;top:calc(env(safe-area-inset-top, 44px) + 12px);left:12px;right:12px;background:rgba(18,20,26,.96);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);color:white;border-radius:20px;padding:16px 18px;display:flex;align-items:center;gap:14px;z-index:999;transform:translateY(-150%);transition:transform .45s cubic-bezier(.32,.72,.24,1);box-shadow:0 12px 40px rgba(0,0,0,.5);border:1px solid var(--sp)}.nb.sh{transform:translateY(0)}
.nbi{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;background:linear-gradient(135deg,var(--ac),var(--pu))}
.nbc{flex:1;min-width:0}.nbt{font-size:13px;font-weight:600;margin-bottom:2px}.nbb{font-size:12px;opacity:.7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
</style>
</head>
<body>
<div class="nb" id="NB"><div class="nbi" id="Ni">⏰</div><div class="nbc"><div class="nbt" id="Nt">SPC</div><div class="nbb" id="Nb"></div></div></div>
<div class="mo" id="SM" onclick="if(event.target===this)cS()"><div class="moi"><div class="mo-top"><div class="mot">Ajustes</div><button class="mo-close" onclick="cS()">✕</button></div>

<div class="sg2" id="sg-rep">
    <div class="sgl" onclick="document.getElementById('sg-rep').classList.toggle('op')">Reportes <span>›</span></div>
    <div class="sg2-bd"><div class="sg2-bd-in">
        <button class="mob ex" style="background:var(--ac);color:#fff" onclick="copyPart()">Copiar parte</button>
    </div></div>
</div>

<div class="sg2" id="sg-vis">
    <div class="sgl" onclick="document.getElementById('sg-vis').classList.toggle('op')">Visualización <span>›</span></div>
    <div class="sg2-bd"><div class="sg2-bd-in">
        <div class="sr"><div class="srt">Mostrar hora</div><button class="tg" id="tC" onclick="tgS('showClock')"></button></div>
        <div class="sr"><div class="srt">Resumen</div><button class="tg" id="tR" onclick="tgS('showResumen')"></button></div>
        <div class="sr"><div class="srt">Silos usados</div><button class="tg" id="tU" onclick="tgS('showUsed')"></button></div>
        <div class="sr"><div class="srt">Mostrar historial</div><button class="tg" id="tH" onclick="tgS('showHist')"></button></div>
        <div class="sr"><div class="srt">Tiempo en historial</div><button class="tg" id="tD" onclick="tgS('showDur')"></button></div>
