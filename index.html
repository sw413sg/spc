<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">

<title>SPC</title>
<style id="TS">
:root{
  --bg:#0a0a0f;--card:#151519;--ce:#1e1e25;--ch:#272730;
  --tx:#e8e8ed;--ts:#6b6b7a;--sp:#2a2a35;
  --ac:#4a9eff;--acd:rgba(74,158,255,.12);--acg:rgba(74,158,255,.25);
  --gn:#3dd68c;--gnd:rgba(61,214,140,.12);
  --or:#f0a030;--ord:rgba(240,160,48,.12);
  --rd:#f05545;--rdd:rgba(240,85,69,.15);
  --pu:#9580ff;--pud:rgba(149,128,255,.12);
  --hdr:rgba(10,10,15,.88);
  --st:env(safe-area-inset-top,20px);--sb:env(safe-area-inset-bottom,0px);
}
</style>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s}

/* Header */
.hd{position:sticky;top:0;z-index:100;background:var(--hdr);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);padding:calc(var(--st)+12px) 20px 16px;border-bottom:1px solid var(--sp)}
.h1r{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.h1l{display:flex;align-items:center;gap:10px}
h1{font-size:28px;font-weight:700;letter-spacing:-.3px}
.acb{display:inline-flex;align-items:center;gap:4px;background:var(--gnd);color:var(--gn);font-size:11px;font-weight:600;padding:3px 8px;border-radius:8px}
.acb.hd2{display:none}
.pld{width:5px;height:5px;background:var(--gn);border-radius:50%;animation:pl 1.5s ease-in-out infinite}
@keyframes pl{0%,100%{opacity:1}50%{opacity:.3}}
.clk{font-size:28px;font-weight:700;letter-spacing:-.3px;font-variant-numeric:tabular-nums}
.clk.hd2{display:none}

.dr{display:flex;align-items:center;gap:8px}
.dnb{background:var(--ce);border:1px solid var(--sp);color:var(--ts);width:36px;height:36px;border-radius:10px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.dnb:active{background:var(--ch);color:var(--tx)}
.dlb{flex:1;text-align:center;font-size:14px;font-weight:600;color:var(--ts)}
.hbb{background:var(--ce);border:1px solid var(--sp);color:var(--ts);font-size:13px;font-weight:600;padding:8px 14px;border-radius:10px;cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .15s;-webkit-user-select:none}
.hbb:active{background:var(--ch);color:var(--tx)}
.hbb.hl{background:var(--acd);color:var(--ac);border-color:rgba(74,158,255,.2)}
.hib{background:var(--ce);border:1px solid var(--sp);color:var(--ts);width:36px;height:36px;border-radius:10px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.hib:active{background:var(--ch)}
.dih{position:absolute;opacity:0;width:0;height:0}

.ctn{padding:16px 16px calc(var(--sb)+16px);max-width:500px;margin:0 auto}

/* Modal */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.mo.sh{opacity:1;pointer-events:auto}
.moi{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:500px;padding:24px 20px calc(var(--sb)+20px);transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);max-height:80vh;overflow-y:auto}
.mo.sh .moi{transform:translateY(0)}
.moh{width:36px;height:4px;background:var(--sp);border-radius:2px;margin:0 auto 16px}
.mot{font-size:20px;font-weight:700;margin-bottom:18px;text-align:center}
.mob{width:100%;height:48px;border:none;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:8px}
.mob:active{opacity:.8}
.mob.ex{background:var(--ac);color:white}
.mob.im{background:var(--ce);color:var(--tx)}
.mob.cl{background:transparent;color:var(--rd);margin-top:6px}
.imf{display:none}
.sg2{margin-bottom:18px}
.sgl{font-size:12px;font-weight:600;color:var(--ts);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;padding:0 2px}
.sr{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;background:var(--ce);border-radius:12px;margin-bottom:6px}
.srt{font-size:14px;font-weight:500}
.tg{width:48px;height:28px;border-radius:14px;background:var(--sp);border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.tg.on{background:var(--gn)}
.tg::after{content:'';position:absolute;width:22px;height:22px;border-radius:11px;background:white;top:3px;left:3px;transition:transform .2s}

.thb{display:flex;gap:6px}
.thbt{flex:1;height:42px;border:1px solid var(--sp);border-radius:10px;background:var(--ce);color:var(--ts);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.thbt:active{transform:scale(.95)}
.thbt.av{background:var(--acd);color:var(--ac);border-color:rgba(74,158,255,.25)}

/* Notif perm */
.np{background:var(--card);border-radius:14px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;border:1px solid var(--sp)}
.np.hd2{display:none}

/* Belt Card */
.bc{background:var(--card);border-radius:14px;margin-bottom:8px;border:1px solid var(--sp);overflow:hidden}
.bhr{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;cursor:pointer}
.bfi{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
/* CE color: warm coral, CD color: slate blue */
.bic{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:12px;color:white;font-weight:700;flex-shrink:0}
.bic.ce{background:#d96c6c}.bic.cd{background:#5b7fbf}
.bxt{flex:1;min-width:0}
.bxn{font-size:15px;font-weight:600}
.bxs{font-size:11px;color:var(--ts);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bxs.av{color:var(--gn)}
.bxr{display:flex;align-items:center;gap:8px;flex-shrink:0}
.bxe{font-size:11px;color:var(--ac);font-weight:500;white-space:nowrap}
.bxe.hd2{display:none}
.bxp{font-size:15px;font-weight:600;font-variant-numeric:tabular-nums;color:var(--gn)}
.bxp.pa{color:var(--or);animation:bk 1s ease-in-out infinite}
.bxp.hd2{display:none}
@keyframes bk{0%,100%{opacity:1}50%{opacity:.4}}
.chv{color:var(--ts);font-size:16px;transition:transform .3s;margin-left:4px}
.bc.xp .chv{transform:rotate(90deg)}
.bbd{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.4,0,.2,1)}
.bc.xp .bbd{max-height:1500px}
.bbi{padding:0 14px 14px}

/* Timer */
.tsx{background:var(--bg);border-radius:12px;padding:16px;text-align:center;border:1px solid var(--sp);margin-bottom:10px}
.txl{font-size:12px;color:var(--ts);font-weight:500;margin-bottom:2px}
.txn{font-size:15px;font-weight:700;margin-bottom:6px}
.txbg{display:flex;gap:5px;justify-content:center;margin-bottom:8px;flex-wrap:wrap}
.txbd{font-size:11px;font-weight:600;padding:3px 9px;border-radius:7px}
.txm{background:var(--ord);color:var(--or)}
.txs{background:var(--pud);color:var(--pu)}
.tdd{font-size:48px;font-weight:200;font-variant-numeric:tabular-nums;letter-spacing:-1px;color:var(--tx);line-height:1;margin-bottom:4px}
.tdd.ru{color:var(--gn)}.tdd.pa{color:var(--or);animation:bk 1s ease-in-out infinite}
.txe{font-size:13px;color:var(--ac);font-weight:500;margin-bottom:12px;font-variant-numeric:tabular-nums}
.txe.hd2{display:none}
.txc{display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
.txb{height:40px;padding:0 16px;border:none;border-radius:20px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;transition:all .15s;-webkit-user-select:none}
.txb:active{transform:scale(.95)}
.xst{background:var(--gn);color:#000;flex:1}.xpa{background:var(--or);color:#000;flex:1}
.xre{background:var(--acd);color:var(--ac);padding:0 14px}
.xsp{background:var(--rdd);color:var(--rd);width:40px;padding:0;flex-shrink:0}
.nsm{font-size:13px;color:var(--ts);text-align:center;padding:10px 0}

.rcb{width:100%;height:38px;border:1px solid var(--sp);border-radius:10px;background:var(--ce);color:var(--ts);font-size:13px;font-weight:500;cursor:pointer;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:5px}
.rcb:active{background:var(--ch);color:var(--tx)}

/* Centena/Silo */
.ctb{display:flex;gap:6px;margin-bottom:10px}
.ctt{flex:1;height:40px;border:1px solid var(--sp);border-radius:10px;background:var(--ce);color:var(--ts);font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.ctt:active{transform:scale(.95)}
.ctt.av{background:var(--acd);color:var(--ac);border-color:rgba(74,158,255,.25)}
.sgr{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;padding:2px}
.sbt{aspect-ratio:1;border:1px solid var(--sp);border-radius:9px;background:var(--ce);color:var(--tx);font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.sbt:active{transform:scale(.92)}
.sbt.sl{background:var(--acd);color:var(--ac);border-color:rgba(74,158,255,.3);box-shadow:0 0 12px var(--acg)}
.sbt.iu{background:var(--ord);color:var(--or);border-color:rgba(240,160,48,.2);opacity:.6;pointer-events:none}

/* Meters */
.msc{margin-top:10px}
.msr{display:flex;gap:6px}
.msb{flex:1;height:40px;border:1px solid var(--sp);border-radius:10px;background:var(--ce);color:var(--or);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px}
.msb:active{transform:scale(.97)}
.msb.av{background:var(--ord);border-color:rgba(240,160,48,.2)}
.vcb{flex:1;height:40px;border:1px solid var(--sp);border-radius:10px;background:var(--ce);color:var(--rd);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px}
.vcb:active{transform:scale(.97);background:var(--rdd)}
.mgd{display:grid;grid-template-columns:repeat(8,1fr);gap:3px;margin-top:6px}
.mgd.hd2{display:none}
.mbt{height:30px;border:1px solid var(--sp);border-radius:7px;background:var(--ce);color:var(--ts);font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s}
.mbt:active{transform:scale(.9)}
.mbt.sl{background:var(--ord);color:var(--or);border-color:rgba(240,160,48,.25)}

/* Speed */
.spc{margin-top:8px}
.sptx{display:flex;gap:5px}
.sptb{flex:1;height:38px;border:1px solid var(--sp);border-radius:10px;background:var(--ce);color:var(--ts);font-size:12px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1.15;transition:all .15s}
.sptb:active{transform:scale(.95)}
.sptb.sn.av{background:var(--gnd);color:var(--gn);border-color:rgba(61,214,140,.25)}
.sptb.sm.av{background:var(--ord);color:var(--or);border-color:rgba(240,160,48,.25)}
.sptb.ss.av{background:var(--rdd);color:var(--rd);border-color:rgba(240,85,69,.25)}
.sptb small{font-size:9px;font-weight:500;opacity:.65;margin-top:1px}

/* History */
.hsx{margin-top:16px}.hsx.hd2{display:none}
.hst{font-size:20px;font-weight:700;padding:0 4px;margin-bottom:10px}
.hse{text-align:center;color:var(--ts);font-size:14px;padding:32px 20px;background:var(--card);border-radius:14px;border:1px solid var(--sp)}
.hbg{margin-bottom:8px}
.hbl{font-size:12px;font-weight:600;color:var(--ts);text-transform:uppercase;letter-spacing:.5px;padding:0 4px;margin-bottom:4px}
.hcd{background:var(--card);border-radius:12px;border:1px solid var(--sp);overflow:hidden}
.hii{padding:10px 12px;border-bottom:1px solid var(--sp)}.hii:last-child{border-bottom:none}
.him{display:flex;justify-content:space-between;align-items:center}
.hil{font-size:12px;color:var(--tx);line-height:1.35;flex:1;min-width:0}
.hmo{color:var(--or);font-weight:600}
.hir{text-align:right;flex-shrink:0;padding-left:8px}
.hit{font-size:13px;font-weight:600;font-variant-numeric:tabular-nums}.hih{font-size:10px;color:var(--ts);margin-top:1px}
.hieb{display:inline-flex;align-items:center;gap:3px;background:var(--ce);border:1px solid var(--sp);color:var(--ts);font-size:10px;font-weight:600;padding:2px 8px;border-radius:6px;margin-top:5px;cursor:pointer}
.hieb:active{background:var(--ch)}
.hiu{margin-top:6px;padding-left:10px;border-left:2px solid var(--sp)}.hiu.hd2{display:none}
.hiud{font-size:11px;color:var(--ts);padding:3px 0;line-height:1.3}.hiud span{color:var(--or);font-weight:600}
.chbb{display:block;width:100%;margin-top:8px;padding:10px;background:none;border:none;color:var(--rd);font-size:14px;font-weight:500;cursor:pointer;text-align:center;border-radius:10px}
.chbb:active{background:var(--rdd)}

/* Notif banner */
.nb{position:fixed;top:calc(var(--st)+8px);left:12px;right:12px;background:rgba(30,30,37,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);color:white;border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:12px;z-index:999;transform:translateY(-120%);transition:transform .4s cubic-bezier(.4,0,.2,1);box-shadow:0 8px 32px rgba(0,0,0,.5);border:1px solid var(--sp)}
.nb.sh{transform:translateY(0)}
.nbi{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;background:var(--ac)}
.nbc{flex:1;min-width:0}.nbt{font-size:13px;font-weight:600;margin-bottom:1px}.nbb{font-size:12px;opacity:.8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
</style>
</head>
<body>
<div class="nb" id="NB"><div class="nbi" id="Ni">📦</div><div class="nbc"><div class="nbt" id="Nt">SPC</div><div class="nbb" id="Nb"></div></div></div>

<div class="mo" id="SM" onclick="if(event.target===this)cS()"><div class="moi"><div class="moh"></div><div class="mot">Ajustes</div>
<div class="sg2" id="NTF_SEC">
  <div class="sgl">Notificaciones iOS</div>
  <button class="mob im" onclick="reqNotif()">🔔 Habilitar Alertas Nativas</button>
</div>
<div class="sg2"><div class="sgl">Visualización</div>
<div class="sr"><div class="srt">Mostrar hora</div><button class="tg" id="tC" onclick="tgS('showClock')"></button></div>
<div class="sr"><div class="srt">Mostrar historial</div><button class="tg" id="tH" onclick="tgS('showHist')"></button></div></div>
<div class="sg2"><div class="sgl">Tema</div><div class="thb"><button class="thbt" id="xD" onclick="sTh('dark')">Oscuro</button><button class="thbt" id="xG" onclick="sTh('gray')">Gris</button><button class="thbt" id="xL" onclick="sTh('light')">Claro</button></div></div>
<div class="sg2"><div class="sgl">Datos</div>
<button class="mob ex" onclick="exD()">📤 Exportar</button>

<input type="file" accept=".json" class="imf" id="IF" onchange="imD(event)"></div>

</div></div>

<div class="hd"><div class="h1r"><div class="h1l"><h1>SPC</h1><span class="acb hd2" id="AC"><span class="pld"></span> <span id="AN">0</span></span></div><div class="clk" id="CK">00:00:00</div></div>
<div class="dr"><button class="dnb" onclick="chD(-1)">‹</button><div class="dlb" id="DL"></div><button class="dnb" onclick="chD(1)">›</button><button class="hbb" id="TB" onclick="goT()">Hoy</button><input type="date" class="dih" id="DI" onchange="piD(this.value)"><button class="hib" onclick="document.getElementById('DI').showPicker()">📅</button><button class="hib" onclick="oS()">⚙️</button></div></div>

<div class="ctn"><div id="BC"></div><div id="HC"></div></div>

<script>
const R=(a,b)=>{const r=[];for(let i=a;i<=b;i++)r.push(i);return r};
const P=n=>n.toString().padStart(2,'0');
const fT=ms=>{const t=Math.floor(ms/1000),h=Math.floor(t/3600),m=Math.floor((t%3600)/60),s=t%60;return`${P(h)}:${P(m)}:${P(s)}`};
const fM=m=>{const h=Math.floor(m/60),r=Math.ceil(m%60);return h>0?`${h}h ${P(r)}m`:`${r} min`};
const dK=d=>`${d.getFullYear()}-${P(d.getMonth()+1)}-${P(d.getDate())}`;
const tK=()=>dK(new Date());
const DN=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'],MN=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const fDL=k=>{const p=k.split('-'),d=new Date(+p[0],+p[1]-1,+p[2]);return`${DN[d.getDay()]} ${+p[2]} ${MN[+p[1]-1]} ${p[0]}`};

// ── Silo logic ──
const siloC=s=>Math.floor(s/100)*100;
const isFiller=s=>[200,400,600].includes(siloC(s));
const is700=(s,bid)=>(bid==='ce1'||bid==='ce2')&&siloC(s)===700;

// Fill limit: meters at which silo is considered full
const FILL_702=[702,705,708,711,714,717];
const FILL_502=[502,505,508,511,514,517];
function fillLimit(silo){
  if(FILL_702.includes(silo))return 15;
  if(FILL_502.includes(silo))return 10;
  return 1;
}

// Speed configs
const SPD_NORMAL={normal:{l:'Normal',s:'5 min/m',mpm:5},moderate:{l:'Moderado',s:'4 min/m',mpm:4},strong:{l:'Fuerte',s:'3 min/m',mpm:3}};
const SPD_FILLER={normal:{l:'Normal',s:'5m=4m',mpm:5/4},moderate:{l:'Moderado',s:'5m=6m',mpm:5/6},strong:{l:'Fuerte',s:'5m=8m',mpm:5/8}};

function getSpeeds(silo){return isFiller(silo)?SPD_FILLER:SPD_NORMAL}

// ETA calculation
function calcETA(meters,speed,elapsed,silo,bid){
  if(!meters||!silo)return null;
  const limit=fillLimit(silo);
  let eff=0;

  if(is700(silo,bid) && limit < 15){
    if(meters > 15){
      eff = (meters - 15) + 6 + Math.max(0, 6 - limit);
    }else if(meters > 6){
      eff = ((meters - 6) * (6 / 9)) + Math.max(0, 6 - limit);
    }else{
      eff = Math.max(meters - limit, 0);
    }
  }else{
    eff=Math.max(meters-limit,0);
  }

  if(eff<=0)return 0;
  const spds=getSpeeds(silo);
  const mpm=(spds[speed||'normal']||spds.normal).mpm;
  const totalMs=eff*mpm*60000;
  const r=totalMs-elapsed;
  return r>0?r:0;
}
const fETA=ms=>{if(ms==null)return'';if(ms<=0)return'¡Completo!';return`~${fM(ms/60000)} restantes`};
const sETA=ms=>{if(ms==null)return'';if(ms<=0)return'✓';return`~${fM(ms/60000)}`};

// ── Data ──
const BELTS=[
  {id:'ce1',n:'CE 1',sh:'CE1',tp:'ce',sg:[{l:'700',s:R(701,718)}]},
  {id:'ce2',n:'CE 2',sh:'CE2',tp:'ce',sg:[{l:'700',s:R(701,717)}]},
  {id:'cd1',n:'CD 1',sh:'CD1',tp:'cd',sg:[{l:'500',s:R(501,518)},{l:'600',s:R(601,617)}]},
  {id:'cd2',n:'CD 2',sh:'CD2',tp:'cd',sg:[{l:'300',s:R(301,318)},{l:'400',s:R(401,417)}]},
  {id:'cd3',n:'CD 3',sh:'CD3',tp:'cd',sg:[{l:'100',s:R(101,118)},{l:'200',s:R(201,218)}]}
];
const aS=b=>b.sg.flatMap(g=>g.s);const gB=id=>BELTS.find(b=>b.id===id);

let cD=tK();const S={},TI={};
const dSt=()=>({silo:null,run:false,pau:false,el:0,st:null,po:0,grp:null,mt:null,sMt:false,spd:'normal',sid:null});
BELTS.forEach(b=>{S[b.id]=dSt()});

let cfg=JSON.parse(localStorage.getItem('spc_cfg')||'{"showClock":true,"showHist":true,"theme":"dark"}');
function tgS(k){cfg[k]=!cfg[k];localStorage.setItem('spc_cfg',JSON.stringify(cfg));aCfg()}
function sTh(t){cfg.theme=t;localStorage.setItem('spc_cfg',JSON.stringify(cfg));aCfg()}

const TH={
  dark:{bg:'#0a0a0f',cd:'#151519',ce:'#1e1e25',ch:'#272730',tx:'#e8e8ed',ts:'#6b6b7a',sp:'#2a2a35',hd:'rgba(10,10,15,.88)'},
  gray:{bg:'#1a1a1e',cd:'#242428',ce:'#2e2e34',ch:'#38383e',tx:'#e0e0e5',ts:'#7a7a88',sp:'#353540',hd:'rgba(26,26,30,.88)'},
  light:{bg:'#f0f0f5',cd:'#ffffff',ce:'#e8e8ee',ch:'#dddde3',tx:'#1a1a1e',ts:'#6e6e7a',sp:'#d0d0d8',hd:'rgba(240,240,245,.88)'}
};
function aCfg(){
  const t=TH[cfg.theme]||TH.dark;
  document.getElementById('TS').textContent=`:root{--bg:${t.bg};--card:${t.cd};--ce:${t.ce};--ch:${t.ch};--tx:${t.tx};--ts:${t.ts};--sp:${t.sp};--ac:#4a9eff;--acd:rgba(74,158,255,.12);--acg:rgba(74,158,255,.25);--gn:#3dd68c;--gnd:rgba(61,214,140,.12);--or:#f0a030;--ord:rgba(240,160,48,.12);--rd:#f05545;--rdd:rgba(240,85,69,.15);--pu:#9580ff;--pud:rgba(149,128,255,.12);--hdr:${t.hd};--st:env(safe-area-inset-top,20px);--sb:env(safe-area-inset-bottom,0px)}`;
  document.getElementById('CK').classList.toggle('hd2',!cfg.showClock);
  document.querySelectorAll('.hsx').forEach(e=>e.classList.toggle('hd2',!cfg.showHist));
  const tc=document.getElementById('tC'),th=document.getElementById('tH');
  if(tc)tc.classList.toggle('on',cfg.showClock);if(th)th.classList.toggle('on',cfg.showHist);
  ['dark','gray','light'].forEach(k=>{const b=document.getElementById('x'+k[0].toUpperCase());if(b)b.classList.toggle('av',cfg.theme===k)});
}

// Persistence
const lK=d=>`spc_l_${d}`,sKy=d=>`spc_s_${d}`;
const gL=(d)=>{try{return JSON.parse(localStorage.getItem(lK(d||cD))||'{}')}catch{return{}}};
const svL=(l,d)=>localStorage.setItem(lK(d||cD),JSON.stringify(l));
const addL=(bid,e)=>{const l=gL();if(!l[bid])l[bid]=[];l[bid].push(e);svL(l)};
function svS(){const sn={};BELTS.forEach(b=>{const s=S[b.id];sn[b.id]={...s,sMt:false}});localStorage.setItem(sKy(cD),JSON.stringify(sn))}
function ldS(){const r=localStorage.getItem(sKy(cD));if(r){try{const sn=JSON.parse(r);BELTS.forEach(b=>{S[b.id]=sn[b.id]?{...dSt(),...sn[b.id]}:dSt()})}catch{BELTS.forEach(b=>{S[b.id]=dSt()})}}else{BELTS.forEach(b=>{S[b.id]=dSt()})}}

// Date
function sDR(){const i=document.getElementById('DI'),n=new Date();i.min=dK(new Date(n.getFullYear()-2,0,1));i.max=dK(new Date(n.getFullYear()+2,11,31));i.value=cD}
function chD(d){const p=cD.split('-'),dt=new Date(+p[0],+p[1]-1,+p[2]);dt.setDate(dt.getDate()+d);swD(dK(dt))}
function goT(){swD(tK())}
function piD(v){if(v)swD(v)}
function swD(k){
  svS();const running={};
  BELTS.forEach(b=>{if(S[b.id].run||S[b.id].pau)running[b.id]={...S[b.id]}});
  cD=k;document.getElementById('DI').value=k;uDL();ldS();
  Object.keys(running).forEach(bid=>{S[bid]=running[bid]});
  renderAll();BELTS.forEach(b=>{if(S[b.id].run&&!TI[b.id])startI(b.id)});
}
function uDL(){document.getElementById('DL').textContent=fDL(cD);const b=document.getElementById('TB');cD===tK()?b.classList.add('hl'):b.classList.remove('hl')}

// Clock
const uCk=()=>{const n=new Date();document.getElementById('CK').textContent=`${P(n.getHours())}:${P(n.getMinutes())}:${P(n.getSeconds())}`};setInterval(uCk,1000);uCk();

// Settings modal
function oS(){
  document.getElementById('SM').classList.add('sh');
  aCfg();
  if('Notification' in window && Notification.permission==='granted'){
    const nSec=document.getElementById('NTF_SEC');
    if(nSec)nSec.classList.add('hd2');
  }
}
function cS(){document.getElementById('SM').classList.remove('sh')}
function exD(){const d={};for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k.startsWith('spc_'))d[k]=localStorage.getItem(k)}const bl=new Blob([JSON.stringify(d,null,2)],{type:'application/json'}),u=URL.createObjectURL(bl),a=document.createElement('a');a.href=u;a.download=`spc_${tK()}.json`;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);cS();sN2('Exportado ✅')}
function imD(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);let c=0;Object.keys(d).forEach(k=>{if(k.startsWith('spc_')){localStorage.setItem(k,d[k]);c++}});ldS();renderAll();cS();sN2(`${c} registros importados ✅`)}catch{alert('Archivo inválido.')}};r.readAsText(f);e.target.value=''}
function reqNotif(){
  if(!('Notification' in window)){
    alert('Tu navegador o dispositivo no soporta notificaciones nativas.');
    return;
  }
  Notification.requestPermission().then(p => {
    if(p === 'granted'){
      sN2('Permiso concedido ✅');
      document.getElementById('NTF_SEC').classList.add('hd2');
    } else {
      alert('Permiso denegado. Debes habilitarlo desde los Ajustes de iOS para esta App.');
    }
  });
}

// Render
function renderAll(){renderB();renderH();uAC();aCfg()}
let sc=Date.now();const nSid=()=>'s'+(sc++);

function renderB(){
  document.getElementById('BC').innerHTML=BELTS.map(b=>{
    const s=S[b.id],tot=aS(b).length;
    let sub,subC='',tP='',tPC='hd2',etP='',etPC='hd2';
    if(s.run||s.pau){
      sub=`Silo ${s.silo}${s.mt?' - '+s.mt+' (mts)':''}`;subC='av';
      tP=fT(s.el);tPC=s.pau?'pa':'';
      if(s.mt){const e=calcETA(s.mt,s.spd,s.el,s.silo,b.id);etP=sETA(e);etPC=''}
    }else if(s.silo){sub=`Silo ${s.silo}${s.mt?' - '+s.mt+' (mts)':''}`}else{sub=`${tot} silos`}

    const multi=b.sg.length>1;let siloH='';
    if(multi){siloH+=`<div class="ctb">${b.sg.map((g,i)=>`<button class="ctt ${s.grp===i?'av':''}" onclick="selG('${b.id}',${i})">${g.l}</button>`).join('')}</div>`;if(s.grp!==null)siloH+=mkG(b.id,b.sg[s.grp].s,s)}
    else{siloH+=mkG(b.id,b.sg[0].s,s)}

    let mtH='',spH='',rcH='';
    if(s.silo){
      mtH=`<div class="msc"><div class="msr"><button class="msb ${s.sMt?'av':''}" onclick="tMt('${b.id}')">📏 Metros${s.mt?' — '+s.mt+'m':''}</button><button class="vcb" onclick="sMt('${b.id}',38)">Vacío</button></div><div class="mgd ${s.sMt?'':'hd2'}">${R(1,38).map(m=>`<button class="mbt ${s.mt===m?'sl':''}" onclick="sMt('${b.id}',${m})">${m}</button>`).join('')}</div></div>`;
      const spds=getSpeeds(s.silo);
      spH=`<div class="spc"><div class="sptx">${Object.entries(spds).map(([k,v])=>`<button class="sptb s${k[0]} ${s.spd===k?'av':''}" onclick="sSp('${b.id}','${k}')">${v.l}<small>${v.s}</small></button>`).join('')}</div></div>`;
      rcH=`<button class="rcb" onclick="rCfg('${b.id}')">↺ Reiniciar configuración</button>`;
    }

    const eta=calcETA(s.mt,s.spd,s.el,s.silo,b.id),etaTxt=fETA(eta),shEta=s.silo&&s.mt&&(s.run||s.pau);
    let ctrl='';
    if(s.silo){
      if(!s.run&&!s.pau){ctrl=`<button class="txb xst" onclick="stT('${b.id}')">▶ Iniciar</button>`}
      else{ctrl=s.run?`<button class="txb xpa" onclick="paT('${b.id}')">⏸ Pausar</button>`:`<button class="txb xst" onclick="reT('${b.id}')">▶ Reanudar</button>`;ctrl+=`<button class="txb xre" onclick="rrT('${b.id}')">↻</button><button class="txb xsp" onclick="spT('${b.id}')">⏹</button>`}
    }

    return`<div class="bc" id="c-${b.id}"><div class="bhr" onclick="tC('${b.id}')"><div class="bfi"><div class="bic ${b.tp}">${b.sh}</div><div class="bxt"><div class="bxn">${b.n}</div><div class="bxs ${subC}">${sub}</div></div><div class="bxr"><div class="bxe ${etPC}" id="pe-${b.id}">${etP}</div><div class="bxp ${tPC}" id="pv-${b.id}">${tP}</div></div></div><div class="chv">›</div></div><div class="bbd"><div class="bbi"><div class="tsx">${s.silo?`<div class="txl">Silo</div><div class="txn">${s.silo}</div><div class="txbg">${s.mt?`<span class="txbd txm">📏 ${s.mt}m</span>`:''}${s.spd!=='normal'?`<span class="txbd txs">${(getSpeeds(s.silo)[s.spd]||{l:''}).l}</span>`:''}</div>`:''}<div class="tdd ${s.run?'ru':s.pau?'pa':''}" id="tm-${b.id}">${fT(s.el)}</div><div class="txe ${shEta?'':'hd2'}" id="et-${b.id}">${etaTxt}</div>${s.silo?`<div class="txc">${ctrl}</div>`:`<div class="nsm">Seleccioná un silo</div>`}</div>${siloH}${mtH}${spH}${rcH}</div></div></div>`;
  }).join('');
}

function mkG(bid,silos,s){return`<div class="sgr">${silos.map(si=>{const iu=inU(si,bid),sl=s.silo===si;return`<button class="sbt ${sl?'sl':iu?'iu':''}" onclick="selS('${bid}',${si})">${si}</button>`}).join('')}</div>`}

function renderH(){
  const c=document.getElementById('HC'),logs=gL();
  const any=BELTS.some(b=>(logs[b.id]||[]).length>0);
  if(!any){c.innerHTML=`<div class="hsx"><div class="hst">Historial</div><div class="hse">Sin registros hoy</div></div>`;aCfg();return}
  let h='<div class="hsx"><div class="hst">Historial</div>';
  BELTS.forEach(b=>{const ent=logs[b.id]||[];if(!ent.length)return;const gr={};ent.forEach(e=>{const sid=e.sid||e.hour+e.silo;if(!gr[sid])gr[sid]=[];gr[sid].push(e)});
    h+=`<div class="hbg"><div class="hbl">${b.n}</div><div class="hcd">`;
    Object.values(gr).reverse().forEach(g=>{const last=g[g.length-1],first=g[0],hasU=g.length>1;
      h+=`<div class="hii"><div class="him"><div class="hil">${b.n} Silo ${last.silo} a <span class="hmo">${first.meters||'?'}m</span>${hasU?` → <span class="hmo">${last.meters||'?'}m</span>`:''}</div><div class="hir"><div class="hit">${last.duration}</div><div class="hih">${last.hour}</div></div></div>`;
      if(hasU){h+=`<button class="hieb" onclick="this.nextElementSibling.classList.toggle('hd2')">📋 ${g.length-1} act.</button><div class="hiu hd2">${g.map((u,i)=>`<div class="hiud">${i===0?'Inicio':'Reinicio'}: <span>${u.meters||'?'}m</span> — ${u.duration} (${u.hour})</div>`).join('')}</div>`}h+=`</div>`});h+=`</div></div>`});
  h+=`<button class="chbb" onclick="clH()">Borrar historial del día</button></div>`;c.innerHTML=h;aCfg();
}

function uAC(){const c=BELTS.filter(b=>S[b.id].run||S[b.id].pau).length;const el=document.getElementById('AC'),n=document.getElementById('AN');c>0?(el.classList.remove('hd2'),n.textContent=c):el.classList.add('hd2')}
function uPv(){BELTS.forEach(b=>{const s=S[b.id];if(s.run||s.pau){const p=document.getElementById(`pv-${b.id}`);if(p)p.textContent=fT(s.el);if(s.mt&&s.silo){const e=calcETA(s.mt,s.spd,s.el,s.silo,b.id);const e1=document.getElementById(`pe-${b.id}`);if(e1)e1.textContent=sETA(e);const e2=document.getElementById(`et-${b.id}`);if(e2)e2.textContent=fETA(e)}}})}
const inU=(si,ex)=>BELTS.some(b=>b.id!==ex&&S[b.id].silo===si&&(S[b.id].run||S[b.id].pau));

// Actions
function tC(id){document.getElementById(`c-${id}`).classList.toggle('xp')}
function selG(bid,i){const s=S[bid];if(s.run||s.pau)return;s.grp=s.grp===i?null:i;if(s.grp!==null){const g=gB(bid).sg[s.grp];if(s.silo&&!g.s.includes(s.silo)){s.silo=null;s.el=0;s.mt=null;s.spd='normal'}}renderAll();document.getElementById(`c-${bid}`).classList.add('xp')}
function selS(bid,si){const s=S[bid];if(s.run||s.pau)return;s.silo=s.silo===si?null:si;s.el=0;s.mt=null;s.sMt=false;s.spd='normal';renderAll();document.getElementById(`c-${bid}`).classList.add('xp')}
function tMt(bid){S[bid].sMt=!S[bid].sMt;renderAll();document.getElementById(`c-${bid}`).classList.add('xp')}
function sMt(bid,m){S[bid].mt=S[bid].mt===m?null:m;renderAll();document.getElementById(`c-${bid}`).classList.add('xp')}
function sSp(bid,sp){S[bid].spd=sp;renderAll();document.getElementById(`c-${bid}`).classList.add('xp')}
function rCfg(bid){const s=S[bid];if(s.run||s.pau)return;s.silo=null;s.mt=null;s.sMt=false;s.spd='normal';s.grp=null;s.el=0;svS();renderAll();document.getElementById(`c-${bid}`).classList.add('xp')}

function startI(bid){const s=S[bid];TI[bid]=setInterval(()=>{s.el=Date.now()-s.st+s.po;const el=document.getElementById(`tm-${bid}`);if(el)el.textContent=fT(s.el);uPv()},200)}
function stT(bid){const s=S[bid];if(!s.silo)return;s.run=true;s.pau=false;s.st=Date.now();s.po=0;s.el=0;s.sid=nSid();startI(bid);const n=new Date(),hr=`${P(n.getHours())}:${P(n.getMinutes())}`;addL(bid,{silo:s.silo,meters:s.mt,speed:s.spd,duration:fT(0),hour:hr,ms:0,sid:s.sid,type:'start'});shN(bid,`Iniciado — Silo ${s.silo}${s.mt?' a '+s.mt+'m':''}`);svS();renderAll();document.getElementById(`c-${bid}`).classList.add('xp')}
function paT(bid){const s=S[bid];s.run=false;s.pau=true;s.po=s.el;clearInterval(TI[bid]);delete TI[bid];shN(bid,`Pausado — Silo ${s.silo}`);svS();renderAll();document.getElementById(`c-${bid}`).classList.add('xp')}
function reT(bid){const s=S[bid];s.run=true;s.pau=false;s.st=Date.now();startI(bid);shN(bid,`Reanudado — Silo ${s.silo}`);svS();renderAll();document.getElementById(`c-${bid}`).classList.add('xp')}
function rrT(bid){const s=S[bid];clearInterval(TI[bid]);const n=new Date(),hr=`${P(n.getHours())}:${P(n.getMinutes())}`;addL(bid,{silo:s.silo,meters:s.mt,speed:s.spd,duration:fT(s.el),hour:hr,ms:s.el,sid:s.sid,type:'restart'});s.run=true;s.pau=false;s.st=Date.now();s.po=0;s.el=0;startI(bid);shN(bid,`Reiniciado — Silo ${s.silo}${s.mt?' a '+s.mt+'m':''}`);svS();renderAll();document.getElementById(`c-${bid}`).classList.add('xp')}
function spT(bid){const s=S[bid];clearInterval(TI[bid]);delete TI[bid];const dur=fT(s.el),n=new Date(),hr=`${P(n.getHours())}:${P(n.getMinutes())}`;const logs=gL();if(logs[bid]){const se=logs[bid].filter(e=>e.sid===s.sid);if(se.length>0){se[se.length-1].duration=dur;se[se.length-1].ms=s.el;se[se.length-1].hour=hr}svL(logs)}shN(bid,`Finalizado — Silo ${s.silo} (${dur})`);sP(gB(bid).n,`Silo ${s.silo} en ${dur}`);s.run=false;s.pau=false;s.el=0;s.po=0;s.sid=null;svS();renderAll();document.getElementById(`c-${bid}`).classList.add('xp')}
function clH(){if(confirm('¿Borrar historial?')){svL({});renderH()}}

// Notif
function shN(bid,msg){const b=gB(bid),bn=document.getElementById('NB');document.getElementById('Ni').textContent='📦';document.getElementById('Nt').textContent=b.n;document.getElementById('Nb').textContent=msg;bn.classList.add('sh');setTimeout(()=>bn.classList.remove('sh'),3500);if(navigator.vibrate)navigator.vibrate(100)}
function sN2(msg){const bn=document.getElementById('NB');document.getElementById('Ni').textContent='✅';document.getElementById('Nt').textContent='SPC';document.getElementById('Nb').textContent=msg;bn.classList.add('sh');setTimeout(()=>bn.classList.remove('sh'),3000)}
function sP(t,bo){if(!('Notification' in window)||Notification.permission!=='granted')return;if(navigator.serviceWorker&&navigator.serviceWorker.controller)navigator.serviceWorker.ready.then(r=>{r.showNotification(t,{body:bo,icon:'./icon-192.png',badge:'./icon-192.png',tag:'spc-'+Date.now(),renotify:true,vibrate:[100,50,100]})}).catch(()=>{})}

if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});

sDR();uDL();ldS();renderAll();
BELTS.forEach(b=>{const s=S[b.id];if(s.run&&s.st){s.el=Date.now()-s.st+s.po;startI(b.id)}});
document.addEventListener('visibilitychange',()=>{if(!document.hidden)BELTS.forEach(b=>{const s=S[b.id];if(s.run){s.el=Date.now()-s.st+s.po;const el=document.getElementById(`tm-${b.id}`);if(el)el.textContent=fT(s.el)}})});
</script>
</body>
</html>
